version: '3.9'
services:
  app:
    build: .
    env_file:
      - .env
    ports:
      - '5000:5000'
    depends_on:
      - mongo
      - redis
      - localstack
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
  redis:
    image: redis:7
    ports:
      - '6379:6379'
  localstack:
    image: localstack/localstack:3
    environment:
      - SERVICES=s3,sqs,ses
      - DEFAULT_REGION=us-east-1
    ports:
      - '4566:4566'
volumes:
  mongo_data:
