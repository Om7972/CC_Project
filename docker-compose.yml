version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: cloudmart-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: cloudmart
    volumes:
      - mongo_data:/data/db
    networks:
      - cloudmart-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloudmart-backend
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://admin:password@mongodb:27017/cloudmart?authSource=admin
      NODE_ENV: development
      FRONTEND_URL: http://localhost:5173
      JWT_SECRET: your_super_secret_jwt_key_here
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: cloudmart-products
      AWS_SES_FROM_EMAIL: noreply@cloudmart.com
      AWS_SQS_QUEUE_URL: ${AWS_SQS_QUEUE_URL}
      COGNITO_USER_POOL_ID: ${COGNITO_USER_POOL_ID}
      COGNITO_CLIENT_ID: ${COGNITO_CLIENT_ID}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    networks:
      - cloudmart-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000/api
        VITE_COGNITO_DOMAIN: https://cloudmart.auth.us-east-1.amazoncognito.com
        VITE_COGNITO_CLIENT_ID: ${COGNITO_CLIENT_ID}
        VITE_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
    container_name: cloudmart-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - cloudmart-network
    restart: unless-stopped

volumes:
  mongo_data:

networks:
  cloudmart-network:
    driver: bridge
