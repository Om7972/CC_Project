# CloudMart local development: API + MongoDB + Redis
# Usage: docker compose up --build
# Optional frontend (Vite): docker compose --profile ui up

services:
  mongodb:
    image: mongo:7.0
    container_name: cloudmart-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: cloudmart
    volumes:
      - mongo_data:/data/db
    networks:
      - cloudmart
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: cloudmart-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - cloudmart
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloudmart-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: "5000"
      MONGO_URI: mongodb://admin:password@mongodb:27017/cloudmart?authSource=admin
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:5173,http://localhost:5174
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_change_me}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_SES_FROM_EMAIL: ${AWS_SES_FROM_EMAIL:-}
      AWS_SQS_QUEUE_URL: ${AWS_SQS_QUEUE_URL:-}
      COGNITO_USER_POOL_ID: ${COGNITO_USER_POOL_ID:-}
      COGNITO_CLIENT_ID: ${COGNITO_CLIENT_ID:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cloudmart
    restart: unless-stopped

  frontend:
    profiles: ["ui"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
        VITE_COGNITO_DOMAIN: ${VITE_COGNITO_DOMAIN:-}
        VITE_COGNITO_CLIENT_ID: ${VITE_COGNITO_CLIENT_ID:-}
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-}
    container_name: cloudmart-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - cloudmart
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:

networks:
  cloudmart:
    driver: bridge
